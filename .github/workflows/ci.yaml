name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  app:
    name: App (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # `npm run build` (= build:production) exercises the real .env.production
      # ${VAR} expansion chain. CI has no .env.local, so inject dummy
      # FIREBASE_PRODUCTION_* values for the expansion to resolve against -
      # without them the references would expand to empty strings and ship a
      # config-less bundle without erroring. Placeholders, not secrets.
      - run: npm run build
        env:
          FIREBASE_PRODUCTION_API_KEY: ci-dummy-api-key
          FIREBASE_PRODUCTION_AUTH_DOMAIN: ci-dummy.firebaseapp.com
          FIREBASE_PRODUCTION_PROJECT_ID: ci-dummy-project
          FIREBASE_PRODUCTION_STORAGE_BUCKET: ci-dummy.appspot.com
          FIREBASE_PRODUCTION_MESSAGING_SENDER_ID: "000000000000"
          FIREBASE_PRODUCTION_APP_ID: "1:000000000000:web:0000000000000000000000"
          FIREBASE_PRODUCTION_MEASUREMENT_ID: ""
      - run: npm test

  functions:
    name: Functions (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
        working-directory: functions
      - run: npm run build
        working-directory: functions
      - run: npm test
        working-directory: functions
