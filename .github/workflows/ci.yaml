name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  app:
    name: App (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  functions:
    name: Functions (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
        working-directory: functions
      - run: npm run build
        working-directory: functions
      - run: npm test
        working-directory: functions
